<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Form</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='add_stu.css') }}">
</head>

<body>

<div class="container">
    <h2>Student's Detail</h2>

    <form action="/add-student" method="POST">
        
        <input type="text" name="name" placeholder="Enter Name" required>
        <input type="text" name="roll" placeholder="Enter Roll No" required>
        <input type="text" name="branch" placeholder="Enter Branch" required>
        <input type="text" name="course" placeholder="Enter Course" required>

        <button type="submit">Add</button>
    </form>
</div>

</body>
</html>
